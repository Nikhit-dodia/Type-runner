<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Test</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Audiowide">
<link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css">
</head>

<body>
   <!---heading and logo-->
  <div class="heading"><i class="uil uil-keyboard"></i>Type-Runner</div> 
  <!--container wraps everything-->
    <div class="container">   
      <div class="stats">
        <p>Time: <span id="timer">0s</span></p>
        <p>Mistakes: <span id="mistakes">0</span></p>
      </div>
      <div
        id="quote"
        onmousedown="return false"
        onselectstart="return false">
    </div>

    <textarea
        rows="3"
        id="quote-input"
        placeholder="Type here when the test starts..">
    </textarea>

        <button id="start-test" onclick="startTest()">Start Test</button> <!--js onlclick starts test-->
        <button id="stop-test" onclick="displayResult()">Stop Test</button> <!--js onclick stops test-->
        <button id="reload"  type="button" onClick="window.location.reload()">Reload Page</button> <!--reloads window evrytime user clicks on reload-->

        <div class="result">
          <h3>Result</h3>
             <div class="wrapper">
               <p>Accuracy: <span id="accuracy"></span></p>
               <p>Speed: <span id="wpm"></span></p>
             </div>
        </div>
 </div>

 <!--light and dark themes-->
<div id="light">
    <a href="#" id="lm">light mode</a>
</div>
<div id="dark">
    <a href="#" id="dm">dark mode</a>
</div>

    <script src="script.js"></script>
</body>
</html>
